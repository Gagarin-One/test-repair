version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: repair_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: repair_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - repair_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d repair_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: repair_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: repair_db
      PORT: 3001
    networks:
      - repair_network

  frontend:
    image: nginx:alpine
    container_name: repair_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - repair_network

networks:
  repair_network:
    driver: bridge

volumes:
  postgres_data:
